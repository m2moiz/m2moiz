name: snake

# Generates the animated "snake eating the contribution grid" SVGs.
# Dark variant uses Tokyo Night palette so the snake stays on-theme.
# Output SVGs are committed to the `output` branch — main stays clean.

on:
  schedule:
    - cron: "43 3 * * *"   # daily ~03:43 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        id: snake
        with:
          github_user_name: m2moiz
          outputs: |
            dist/github-snake.svg?palette=github-light
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#7AA2F7&color_dots=#1A1B26,#7AA2F7,#7DCFFF,#BB9AF7,#F7768E

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
