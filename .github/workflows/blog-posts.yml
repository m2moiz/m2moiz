name: sync blog posts

# Dormant scaffold — activates once user adds their real handles below.
# Replace YOUR_MEDIUM_HANDLE and YOUR_SUBSTACK_HANDLE when ready.
#
# Medium RSS format:   https://medium.com/feed/@HANDLE
# Substack RSS format: https://HANDLE.substack.com/feed
#
# If you don't have one of these, delete the matching job.

on:
  schedule:
    - cron: "17 * * * *"   # hourly at :17 (avoid the :00 thundering herd)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  medium:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pull latest Medium posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://medium.com/feed/@YOUR_MEDIUM_HANDLE"
          max_post_count: 4
          comment_tag_name: "MEDIUM-POST-LIST"
          template: "- [$title]($url) · <sub>$date</sub>"
          date_format: "mmm d, yyyy"
          commit_message: "chore: refresh medium feed"

  substack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pull latest Substack posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://YOUR_SUBSTACK_HANDLE.substack.com/feed"
          max_post_count: 4
          comment_tag_name: "SUBSTACK-POST-LIST"
          template: "- [$title]($url) · <sub>$date</sub>"
          date_format: "mmm d, yyyy"
          commit_message: "chore: refresh substack feed"
