name: sync papers

# Rewrites the PAPERS-LIST block in README.md from data/papers.md
# whenever the curated reading list changes.

on:
  push:
    paths:
      - "data/papers.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync papers block into README
        run: |
          python3 - <<'PY'
          import re
          import pathlib

          papers = pathlib.Path("data/papers.md").read_text().strip()
          readme_path = pathlib.Path("README.md")
          readme = readme_path.read_text()

          pattern = r"(<!-- PAPERS-LIST:START -->)(.*?)(<!-- PAPERS-LIST:END -->)"
          replacement = r"\1\n" + papers + r"\n\3"
          new = re.sub(pattern, replacement, readme, flags=re.DOTALL)

          if new != readme:
              readme_path.write_text(new)
              print("README.md updated")
          else:
              print("no changes needed")
          PY

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: sync papers list"
          git push
