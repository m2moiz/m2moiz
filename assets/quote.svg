<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 130" width="800" height="130" role="img" aria-label='Every year in tech brings me one step closer to a mountain, a flock of goats, and no Wi-Fi. ~ m2moiz'>
  <title>Every year in tech brings me one step closer to a mountain, a flock of goats, and no Wi-Fi. ~ m2moiz</title>

  <defs>
    <style>
      .q {
        font-family: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', 'SF Mono', 'Consolas', 'Monaco', ui-monospace, monospace;
        font-size: 18px;
        fill: #7AA2F7;
      }
      .a {
        font-family: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', 'SF Mono', 'Consolas', 'Monaco', ui-monospace, monospace;
        font-size: 13px;
        fill: #7AA2F7;
        opacity: 0.65;
      }
    </style>

    <!-- clipPath for line 1 - left-to-right reveal -->
    <clipPath id="reveal1">
      <rect x="0" y="0" width="0" height="45">
        <animate attributeName="width" from="0" to="800" begin="0.4s" dur="2.6s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>

    <!-- clipPath for line 2 - starts after line 1 finishes + small pause -->
    <clipPath id="reveal2">
      <rect x="0" y="45" width="0" height="45">
        <animate attributeName="width" from="0" to="800" begin="3.2s" dur="2.5s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Line 1 (revealed via clipPath) -->
  <g clip-path="url(#reveal1)">
    <text class="q" x="400" y="34" text-anchor="middle">"Every year in tech brings me one step closer to</text>
  </g>

  <!-- Line 2 -->
  <g clip-path="url(#reveal2)">
    <text class="q" x="400" y="63" text-anchor="middle">a mountain, a flock of goats, and no Wi-Fi."</text>
  </g>

  <!-- Blinking cursor: appears at ~5.7s (right after line 2 finishes) and blinks forever -->
  <rect x="642" y="47" width="9" height="20" fill="#7AA2F7" opacity="0">
    <animate attributeName="opacity"
             values="1;1;0;0"
             keyTimes="0;0.5;0.5;1"
             begin="5.8s"
             dur="1.1s"
             repeatCount="indefinite"/>
  </rect>

  <!-- Attribution: fades in after cursor appears -->
  <text class="a" x="760" y="105" text-anchor="end" opacity="0">
    ~ m2moiz
    <animate attributeName="opacity" from="0" to="0.65" begin="6.4s" dur="1.2s" fill="freeze"/>
  </text>
</svg>
